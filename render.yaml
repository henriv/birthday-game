services:
  - type: web
    name: birthday-grammar-game
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_ANTHROPIC_API_KEY
        scope: build
        value: ${NEXT_PUBLIC_ANTHROPIC_API_KEY}
      - key: NODE_ENV
        value: production
